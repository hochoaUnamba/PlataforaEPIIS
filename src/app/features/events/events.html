<div class="events-page max-w-7xl mx-auto px-6 lg:px-8 pt-6 md:pt-8">

  <div class="section-header" appScrollAnimation>
    <span class="section-badge">Eventos</span>
    <h1 class="section-title">Próximos Eventos</h1>
    <p class="section-subtitle">Seminarios, congresos, talleres y actividades académicas programadas por EPIIS.</p>
  </div>

  <div class="events-grid" appScrollAnimation>
    @for (ev of eventos(); track ev.titulo) {
      <div class="event-card card bg-white border-round shadow-1 border-1 border-200 overflow-hidden">
        <div class="event-header">
          <i [class]="ev.icono + ' event-icon'"></i>
          <p-tag [value]="ev.tipo" [severity]="getSeverity(ev.tipo)"></p-tag>
        </div>
        <div class="event-body">
          <h3 class="event-title">{{ ev.titulo }}</h3>
          <div class="event-meta">
            <span><i class="pi pi-calendar mr-1"></i>{{ ev.fecha }}</span>
            <span><i class="pi pi-map-marker mr-1"></i>{{ ev.lugar }}</span>
          </div>
          <p class="event-desc">{{ ev.descripcion }}</p>
        </div>
        <div class="event-footer">
          <p-button label="Más información" icon="pi pi-arrow-right" [text]="true" size="small"></p-button>
        </div>
      </div>
    }
  </div>
</div>
