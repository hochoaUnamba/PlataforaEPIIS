<div class="events-page max-w-7xl mx-auto px-4 md:px-6">
  <div class="text-center my-5" appScrollAnimation>
    <span class="section-badge">Eventos</span>
    <h1 class="section-title">Próximos Eventos</h1>
    <p class="section-subtitle">Seminarios, congresos, talleres y actividades académicas programadas por EPIIS.</p>
  </div>

  <div class="events-grid" appScrollAnimation>
    @for (ev of eventos; track ev.titulo) {
      <div class="bg-white border-round border-1 border-200 overflow-hidden hover-card" style="border-radius: 14px;">
        <div class="p-4">
          <div class="flex justify-content-between align-items-start mb-3">
            <i [class]="ev.icono + ' text-3xl text-blue-600'"></i>
            <p-tag [value]="ev.tipo" [severity]="getSeverity(ev.tipo)"></p-tag>
          </div>
          <h3 class="text-lg font-bold text-gray-800 mb-2">{{ ev.titulo }}</h3>
          <p class="text-sm text-gray-500 mb-2 flex align-items-center gap-1">
            <i class="pi pi-calendar"></i> {{ ev.fecha }}
          </p>
          <p class="text-gray-600 text-sm leading-relaxed mb-3">{{ ev.descripcion }}</p>
          <p class="text-xs text-gray-400 flex align-items-center gap-1">
            <i class="pi pi-map-marker"></i> {{ ev.lugar }}
          </p>
        </div>
        <div class="px-4 pb-4 pt-2 border-top-1 border-100">
          <p-button label="Más información" icon="pi pi-arrow-right" [text]="true" size="small"></p-button>
        </div>
      </div>
    }
  </div>
</div>
