<div class="news-page max-w-7xl mx-auto px-6 lg:px-8 pt-6 md:pt-8">

  <div class="section-header" appScrollAnimation>
    <span class="section-badge">Actualidad</span>
    <h1 class="section-title">Noticias y Actualidad</h1>
    <p class="section-subtitle">Mantente informado sobre los acontecimientos académicos, logros y eventos de nuestra Escuela Profesional.</p>
  </div>

  <div class="news-grid" appScrollAnimation>
    @for (noticia of noticiasList(); track noticia.titulo) {
      <div class="news-card card bg-white border-round shadow-1 border-1 border-200 overflow-hidden flex flex-column">

        <div class="news-img-wrap">
          <img [src]="noticia.imagen" [alt]="'Imagen: ' + noticia.titulo" loading="lazy" class="news-img" />
          <span class="news-category-badge">{{ noticia.categoria }}</span>
        </div>

        <div class="news-body p-5 flex-grow-1 flex flex-column">
          <span class="news-date"><i class="pi pi-calendar mr-1"></i>{{ noticia.fecha }}</span>
          <h3 class="news-title">{{ noticia.titulo }}</h3>
          <p class="news-summary">{{ noticia.resumen }}</p>
          <div class="mt-auto pt-3 border-top-1 border-100">
            <p-button label="Leer más" icon="pi pi-arrow-right" [text]="true" size="small"></p-button>
          </div>
        </div>

      </div>
    }
  </div>
</div>
